version = 1
revision = 3
requires-python = ">=3.12"

[manifest]
members = [
    "arcanalyse-api",
    "arcanalyse-core",
    "arcanalyse-db",
    "arcanalyse-training",
]

[[package]]
name = "arcanalyse-api"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "arcanalyse-core" },
    { name = "arcanalyse-db" },
]

[package.metadata]
requires-dist = [
    { name = "arcanalyse-core", editable = "packages/arcanalyse-core" },
    { name = "arcanalyse-db", editable = "packages/arcanalyse-db" },
]

[package.metadata.requires-dev]
dev = []

[[package]]
name = "arcanalyse-core"
version = "0.1.0"
source = { editable = "packages/arcanalyse-core" }

[[package]]
name = "arcanalyse-db"
version = "0.1.0"
source = { editable = "packages/arcanalyse-db" }
dependencies = [
    { name = "arcanalyse-core" },
]

[package.metadata]
requires-dist = [{ name = "arcanalyse-core", editable = "packages/arcanalyse-core" }]

[[package]]
name = "arcanalyse-training"
version = "0.1.0"
source = { editable = "packages/arcanalyse-training" }
dependencies = [
    { name = "arcanalyse-core" },
    { name = "arcanalyse-db" },
]

[package.metadata]
requires-dist = [
    { name = "arcanalyse-core", editable = "packages/arcanalyse-core" },
    { name = "arcanalyse-db", editable = "packages/arcanalyse-db" },
]

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arcanalyse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: arcanalyse
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - arcanalyse-internal

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: arcanalyse-umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arcanalyse-internal
      - proxy

  listmonk:
    image: listmonk/listmonk:latest
    container_name: arcanalyse-listmonk
    restart: unless-stopped
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_db__host: postgres
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: ${POSTGRES_USER}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arcanalyse-internal
      - proxy

  formbricks:
    image: formbricks/formbricks:latest
    container_name: arcanalyse-formbricks
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/formbricks
      NEXTAUTH_SECRET: ${FORMBRICKS_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${FORMBRICKS_NEXTAUTH_URL}
      WEBAPP_URL: ${WEBAPP_URL}
      CRON_SECRET: ${CRON_SECRET}
      ENCRYPTION_KEY: ${FORMBRICKS_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arcanalyse-internal
      - proxy

volumes:
  pgdata:

networks:
  arcanalyse-internal:
    driver: bridge
  proxy:
    external: true
